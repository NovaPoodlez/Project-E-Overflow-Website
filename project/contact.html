<!DOCTYPE html>
<html lang="en" style="height:100%;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>contact — E-Overflow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      font-family: 'Readex Pro', system-ui, -apple-system, sans-serif;
      background: #000;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    input, textarea, select {
      font-family: inherit;
    }
    ::placeholder { color: rgba(255,255,255,0.25); }
    input:focus, textarea:focus { outline: none; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" style="flex:1; display:flex; flex-direction:column;"></div>
  <script type="text/babel">

    const { useState } = React;

    function LogoSVG() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="49.47 49.42 277.54 276.4" style={{ height: "20px", width: "20px", display: "block" }} fill="#ffffff" aria-hidden="true">
          <path fillRule="evenodd" d="M182.100 49.516 C 145.533 51.664,114.833 65.171,89.884 90.089 C 35.961 143.943,36.010 231.471,89.992 285.405 C 152.531 347.888,257.073 336.334,304.405 261.707 C 314.924 245.122,323.277 222.051,324.710 205.628 L 324.852 203.997 312.076 204.049 L 299.300 204.100 298.784 207.000 C 284.676 286.234,195.323 325.781,127.300 282.899 C 72.968 248.649,58.388 175.002,95.563 122.600 C 137.823 63.031,224.798 58.613,272.728 113.600 C 276.242 117.632,282.600 126.184,282.600 126.879 C 282.600 126.927,277.695 128.602,271.700 130.600 C 265.705 132.598,260.807 134.293,260.815 134.367 C 260.854 134.707,312.501 180.598,312.579 180.362 C 312.873 179.483,327.117 112.291,327.018 112.250 C 326.952 112.222,322.579 113.639,317.301 115.400 C 306.111 119.131,307.545 118.822,306.869 117.650 C 285.983 81.415,247.067 55.744,205.200 50.585 C 198.018 49.700,187.360 49.207,182.100 49.516 M174.870 108.999 C 174.634 109.094,174.385 109.263,174.316 109.374 C 174.247 109.485,171.183 123.239,167.507 139.938 C 160.359 172.412,159.927 174.321,157.791 182.860 C 157.026 185.917,156.400 188.719,156.400 189.087 L 156.400 189.754 162.150 189.880 C 177.701 190.219,179.044 190.278,179.269 190.636 C 179.617 191.190,173.483 223.249,167.299 253.200 C 164.968 264.489,164.689 266.524,165.589 265.710 C 167.829 263.682,218.098 172.360,218.740 169.152 L 218.850 168.600 208.612 168.600 C 197.734 168.600,197.600 168.588,197.600 167.643 C 197.600 167.344,202.387 154.106,208.238 138.225 C 218.371 110.721,218.859 109.338,218.500 109.075 C 218.063 108.756,175.657 108.681,174.870 108.999 " />
        </svg>
      );
    }

    function Field({ label, type = "text", placeholder, value, onChange, multiline }) {
      const [focused, setFocused] = useState(false);
      const base = {
        width: "100%", background: "transparent",
        border: "none", borderBottom: `1px solid ${focused ? "rgba(255,255,255,0.6)" : "rgba(255,255,255,0.15)"}`,
        color: "#fff", fontSize: "16px", padding: "16px 0",
        resize: "none", transition: "border-color 0.2s",
        display: "block"
      };
      return (
        <div style={{ marginBottom: "40px" }}>
          <label style={{ fontSize: "11px", letterSpacing: "0.14em", textTransform: "uppercase", color: "rgba(255,255,255,0.35)", display: "block", marginBottom: "8px" }}>{label}</label>
          {multiline
            ? <textarea rows={4} placeholder={placeholder} value={value} onChange={onChange}
                onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
                style={base} />
            : <input type={type} placeholder={placeholder} value={value} onChange={onChange}
                onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
                style={base} />
          }
        </div>
      );
    }

    function SiteNav({ active }) {
      const [missionOpen, setMissionOpen] = React.useState(false);
      const [strategyOpen, setStrategyOpen] = React.useState(false);
      const [feasibilityOpen, setFeasibilityOpen] = React.useState(false);
      const [reportOpen, setReportOpen] = React.useState(false);
      const missionTimer = React.useRef(null);
      const strategyTimer = React.useRef(null);
      const feasibilityTimer = React.useRef(null);
      const reportTimer = React.useRef(null);

      const openMission = () => { clearTimeout(missionTimer.current); setMissionOpen(true); };
      const closeMission = () => { missionTimer.current = setTimeout(() => setMissionOpen(false), 120); };
      const openStrategy = () => { clearTimeout(strategyTimer.current); setStrategyOpen(true); };
      const closeStrategy = () => { strategyTimer.current = setTimeout(() => setStrategyOpen(false), 120); };
      const openFeasibility = () => { clearTimeout(feasibilityTimer.current); setFeasibilityOpen(true); };
      const closeFeasibility = () => { feasibilityTimer.current = setTimeout(() => setFeasibilityOpen(false), 120); };
      const openReport = () => { clearTimeout(reportTimer.current); setReportOpen(true); };
      const closeReport = () => { reportTimer.current = setTimeout(() => setReportOpen(false), 120); };

      const chevron = (open) => (
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{ opacity: 0.5, transition: "transform 0.25s", transform: open ? "rotate(180deg)" : "rotate(0deg)" }}>
          <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );

      const dropdownShell = (open) => ({
        position: "absolute", top: "calc(100% + 10px)", left: "50%",
        background: "rgba(23,23,23,0.97)", backdropFilter: "blur(16px)",
        border: "1px solid rgba(255,255,255,0.1)", borderRadius: "16px",
        padding: "8px", minWidth: "220px",
        opacity: open ? 1 : 0,
        pointerEvents: open ? "auto" : "none",
        transform: open ? "translateX(-50%) translateY(0)" : "translateX(-50%) translateY(-6px)",
        transition: "opacity 0.2s ease, transform 0.2s ease",
        zIndex: 100,
      });

      const arrowTip = {
        position: "absolute", top: "-5px", left: "50%", transform: "translateX(-50%) rotate(45deg)",
        width: "10px", height: "10px", background: "rgba(23,23,23,0.97)",
        border: "1px solid rgba(255,255,255,0.1)", borderBottom: "none", borderRight: "none",
      };

      const dropItem = (href, icon, title, sub) => (
        <a href={href} style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px 14px", borderRadius: "10px", textDecoration: "none", transition: "background 0.15s", color: "#fff" }}
          onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.08)"}
          onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
          <div style={{ width: "32px", height: "32px", borderRadius: "8px", background: "rgba(255,255,255,0.07)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{icon}</div>
          <div>
            <p style={{ fontSize: "13px", fontWeight: 500, margin: 0, letterSpacing: "-0.02em" }}>{title}</p>
            <p style={{ fontSize: "11px", color: "rgba(255,255,255,0.4)", margin: "2px 0 0" }}>{sub}</p>
          </div>
        </a>
      );

      const navItems = [
        { label: "strategy", href: "index.html#strategy", strategyDropdown: true },
        { label: "mission",  href: "index.html#mission",  missionDropdown: true },
        { label: "feasibility", href: "index.html#feasibility", feasibilityDropdown: true },
        { label: "report", href: "contents.html", reportDropdown: true },
        { label: "team",     href: "index.html#team" },
      ];

      return (
        <nav style={{ padding: "20px 40px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: "1px solid rgba(255,255,255,0.06)", position: "sticky", top: 0, background: "rgba(0,0,0,0.92)", backdropFilter: "blur(14px)", zIndex: 50 }}>
          <a href="index.html" style={{ display: "flex", alignItems: "center", gap: "8px", textDecoration: "none" }}>
            <LogoSVG />
            <span style={{ color: "#fff", fontSize: "14px", letterSpacing: "-0.02em" }}>E-Overflow</span>
          </a>
          <div style={{ display: "flex", alignItems: "center", gap: "4px" }}>
            {navItems.map(({ label, href, strategyDropdown, missionDropdown, feasibilityDropdown, reportDropdown }) => {
              if (strategyDropdown) return (
                <div key={label} style={{ position: "relative" }} onMouseEnter={openStrategy} onMouseLeave={closeStrategy}>
                  <a href={href} style={{ color: active === "strategy" ? "#fff" : "rgba(212,212,212,1)", fontSize: "14px", padding: "8px 20px", borderRadius: "999px", textDecoration: "none", transition: "color 0.2s", display: "flex", alignItems: "center", gap: "5px" }}>
                    {label}{chevron(strategyOpen)}
                  </a>
                  <div style={dropdownShell(strategyOpen)}>
                    <div style={arrowTip}></div>
                    {dropItem("solution-one.html", <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.7 }}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>, "Solution One — Timer", "Scheduled load shifting")}
                    {dropItem("solution-two.html", <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.7 }}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>, "Solution Two — Diverter", "Real-time surplus sensing")}
                  </div>
                </div>
              );
              if (missionDropdown) return (
                <div key={label} style={{ position: "relative" }} onMouseEnter={openMission} onMouseLeave={closeMission}>
                  <a href={href} style={{ color: active === "mission" ? "#fff" : "rgba(212,212,212,1)", fontSize: "14px", padding: "8px 20px", borderRadius: "999px", textDecoration: "none", transition: "color 0.2s", display: "flex", alignItems: "center", gap: "5px" }}>
                    {label}{chevron(missionOpen)}
                  </a>
                  <div style={dropdownShell(missionOpen)}>
                    <div style={arrowTip}></div>
                    {dropItem("lama-lama.html", <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.7 }}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>, "Lama Lama Community", "Cape York, Queensland")}
                  </div>
                </div>
              );
              if (feasibilityDropdown) return (
                <div key={label} style={{ position: "relative" }} onMouseEnter={openFeasibility} onMouseLeave={closeFeasibility}>
                  <a href={href} style={{ color: active === "feasibility" || feasibilityOpen ? "#fff" : "rgba(212,212,212,1)", fontSize: "14px", padding: "8px 20px", borderRadius: "999px", textDecoration: "none", transition: "color 0.2s", display: "flex", alignItems: "center", gap: "5px" }}>
                    {label}{chevron(feasibilityOpen)}
                  </a>
                  <div style={dropdownShell(feasibilityOpen)}>
                    <div style={arrowTip}></div>
                    {dropItem("lama-lama-feasibility.html",
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.7 }}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" /></svg>,
                      "Lama Lama — Feasibility Study", "Preliminary draft, 2026"
                    )}
                  </div>
                </div>
              );
              if (reportDropdown) return (
                <div key={label} style={{ position: "relative" }} onMouseEnter={openReport} onMouseLeave={closeReport}>
                  <a href={href} style={{ color: reportOpen ? "#fff" : "rgba(212,212,212,1)", fontSize: "14px", padding: "8px 20px", borderRadius: "999px", textDecoration: "none", transition: "color 0.2s", display: "flex", alignItems: "center", gap: "5px" }}>
                    {label}{chevron(reportOpen)}
                  </a>
                  <div style={{ ...dropdownShell(reportOpen), minWidth: "300px" }}>
                    <div style={arrowTip}></div>
                    {dropItem("contents.html", <span style={{ fontFamily: "'JetBrains Mono', ui-monospace, monospace", fontSize: "11px", color: "rgba(255,255,255,0.7)", letterSpacing: "0.02em" }}>00</span>, "Contents", "Table of contents")}
                    {dropItem("executive-summary.html", <span style={{ fontFamily: "'JetBrains Mono', ui-monospace, monospace", fontSize: "11px", color: "rgba(255,255,255,0.7)", letterSpacing: "0.02em" }}>01</span>, "Executive Summary", "Project at a glance")}
                    {dropItem("problem.html", <span style={{ fontFamily: "'JetBrains Mono', ui-monospace, monospace", fontSize: "11px", color: "rgba(255,255,255,0.7)", letterSpacing: "0.02em" }}>03</span>, "Problem & Brief", "Needs & success criteria")}
                    {dropItem("design-process.html", <span style={{ fontFamily: "'JetBrains Mono', ui-monospace, monospace", fontSize: "11px", color: "rgba(255,255,255,0.7)", letterSpacing: "0.02em" }}>04</span>, "Design Process", "Ideation, decision matrix")}
                    {dropItem("considerations.html", <span style={{ fontFamily: "'JetBrains Mono', ui-monospace, monospace", fontSize: "11px", color: "rgba(255,255,255,0.7)", letterSpacing: "0.02em" }}>06</span>, "Considerations", "Social, cultural, environmental")}
                    {dropItem("risks.html", <span style={{ fontFamily: "'JetBrains Mono', ui-monospace, monospace", fontSize: "11px", color: "rgba(255,255,255,0.7)", letterSpacing: "0.02em" }}>08</span>, "Risks & Concerns", "Register + FAQ")}
                    {dropItem("implementation.html", <span style={{ fontFamily: "'JetBrains Mono', ui-monospace, monospace", fontSize: "11px", color: "rgba(255,255,255,0.7)", letterSpacing: "0.02em" }}>09</span>, "Implementation Plan", "Timeline, training, M&E")}
                    {dropItem("recommendations.html", <span style={{ fontFamily: "'JetBrains Mono', ui-monospace, monospace", fontSize: "11px", color: "rgba(255,255,255,0.7)", letterSpacing: "0.02em" }}>10</span>, "Recommendations", "What's next")}
                    {dropItem("references.html", <span style={{ fontFamily: "'JetBrains Mono', ui-monospace, monospace", fontSize: "11px", color: "rgba(255,255,255,0.7)", letterSpacing: "0.02em" }}>12</span>, "References", "APA 7 bibliography")}
                  </div>
                </div>
              );
                            return (
                <a key={label} href={href} style={{ color: active === label ? "#fff" : "rgba(212,212,212,1)", fontSize: "14px", padding: "8px 20px", borderRadius: "999px", textDecoration: "none", transition: "color 0.2s" }}
                  onMouseEnter={e => e.target.style.color = "#fff"}
                  onMouseLeave={e => e.target.style.color = active === label ? "#fff" : "rgba(212,212,212,1)"}
                >{label}</a>
              );
            })}
          </div>
          <a href="contact.html" style={{ background: "#fff", color: "#000", fontSize: "14px", fontWeight: 400, borderRadius: "999px", padding: "10px 22px", textDecoration: "none", transition: "background 0.2s" }}
            onMouseEnter={e => e.currentTarget.style.background = "#e5e5e5"}
            onMouseLeave={e => e.currentTarget.style.background = "#fff"}
          >learn more</a>
        </nav>
      );
    }

    function ContactPage() {
      const [form, setForm] = useState({ name: "", email: "", org: "", message: "", interest: "general" });
      const [submitted, setSubmitted] = useState(false);

      const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

      const handleSubmit = (e) => {
        e.preventDefault();
        setSubmitted(true);
      };

      return (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: "100vh" }}>
          <SiteNav active="contact" />

          {/* Main */}
          <main style={{ flex: 1, display: "grid", gridTemplateColumns: "1fr 1fr", minHeight: "calc(100vh - 73px)" }}>

            {/* Left — heading */}
            <div style={{ padding: "100px 80px 80px 40px", display: "flex", flexDirection: "column", justifyContent: "space-between", borderRight: "1px solid rgba(255,255,255,0.06)" }}>
              <div>
                <p style={{ fontSize: "12px", letterSpacing: "0.18em", textTransform: "uppercase", color: "rgba(255,255,255,0.3)", marginBottom: "40px" }}>contact</p>
                <h1 style={{ fontSize: "clamp(48px, 6vw, 96px)", fontWeight: 500, letterSpacing: "-0.04em", lineHeight: 0.92, color: "#fff", margin: "0 0 40px" }}>
                  let's start<br />the conversation
                </h1>
                <p style={{ fontSize: "16px", color: "rgba(255,255,255,0.45)", lineHeight: 1.7, maxWidth: "360px" }}>
                  Whether you're exploring a new project, want a feasibility study, or just want to talk energy — we're here.
                </p>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>
                <div>
                  <p style={{ fontSize: "11px", letterSpacing: "0.14em", textTransform: "uppercase", color: "rgba(255,255,255,0.25)", margin: "0 0 6px" }}>email</p>
                  <a href="mailto:hello@e-overflow.com" style={{ fontSize: "16px", color: "rgba(255,255,255,0.7)", textDecoration: "none" }}>hello@e-overflow.com</a>
                </div>
                <div>
                  <p style={{ fontSize: "11px", letterSpacing: "0.14em", textTransform: "uppercase", color: "rgba(255,255,255,0.25)", margin: "0 0 6px" }}>CAPSTONE PROJECT PARTNERS</p>
                  <p style={{ fontSize: "15px", color: "rgba(255,255,255,0.5)", margin: 0, lineHeight: 1.7 }}>EWB · UTS </p>
                </div>
              </div>
            </div>

            {/* Right — form */}
            <div style={{ padding: "100px 40px 80px 80px", display: "flex", alignItems: "flex-start" }}>
              {submitted ? (
                <div style={{ paddingTop: "40px" }}>
                  <p style={{ fontSize: "48px", margin: "0 0 24px" }}>✓</p>
                  <h2 style={{ fontSize: "32px", fontWeight: 500, letterSpacing: "-0.04em", color: "#fff", margin: "0 0 16px" }}>message sent</h2>
                  <p style={{ fontSize: "16px", color: "rgba(255,255,255,0.5)", lineHeight: 1.7, maxWidth: "360px" }}>
                    Thanks for reaching out. We'll get back to you within one business day.
                  </p>
                </div>
              ) : (
                <form onSubmit={handleSubmit} style={{ width: "100%", maxWidth: "480px" }}>
                  <Field label="your name" placeholder="Full name" value={form.name} onChange={set("name")} />
                  <Field label="email address" type="email" placeholder="you@company.com" value={form.email} onChange={set("email")} />
                  <Field label="organisation" placeholder="Company or project name" value={form.org} onChange={set("org")} />

                  <div style={{ marginBottom: "40px" }}>
                    <label style={{ fontSize: "11px", letterSpacing: "0.14em", textTransform: "uppercase", color: "rgba(255,255,255,0.35)", display: "block", marginBottom: "12px" }}>area of interest</label>
                    <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
                      {["general", "feasibility study", "system design", "partnership"].map(opt => (
                        <button type="button" key={opt} onClick={() => setForm(f => ({ ...f, interest: opt }))}
                          style={{
                            background: form.interest === opt ? "#fff" : "transparent",
                            color: form.interest === opt ? "#000" : "rgba(255,255,255,0.5)",
                            border: `1px solid ${form.interest === opt ? "#fff" : "rgba(255,255,255,0.2)"}`,
                            borderRadius: "999px", padding: "8px 18px", fontSize: "13px",
                            cursor: "pointer", transition: "all 0.2s"
                          }}
                        >{opt}</button>
                      ))}
                    </div>
                  </div>

                  <Field label="message" placeholder="Tell us about your project or question…" value={form.message} onChange={set("message")} multiline={true} />

                  <button type="submit" style={{
                    background: "#fff", color: "#000", fontSize: "15px", fontWeight: 400,
                    borderRadius: "999px", padding: "16px 40px", border: "none", cursor: "pointer",
                    transition: "background 0.2s", width: "100%"
                  }}
                    onMouseEnter={e => e.target.style.background = "#e5e5e5"}
                    onMouseLeave={e => e.target.style.background = "#fff"}
                  >send message</button>
                </form>
              )}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ContactPage />);
  
</script>

  <!-- Back-to-top button (universal) -->
  <button id="back-to-top" type="button" aria-label="Back to top"
    style="position:fixed;right:24px;bottom:24px;z-index:200;width:44px;height:44px;border-radius:999px;border:1px solid rgba(255,255,255,0.18);background:rgba(23,23,23,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity 0.25s ease, transform 0.25s ease, background 0.2s ease;font-family:inherit;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="12" y1="19" x2="12" y2="5"></line>
      <polyline points="5 12 12 5 19 12"></polyline>
    </svg>
  </button>
  <script>
    (function () {
      var btn = document.getElementById('back-to-top');
      if (!btn) return;
      var threshold = 400;
      function update() {
        var y = window.scrollY || document.documentElement.scrollTop || 0;
        if (y > threshold) {
          btn.style.opacity = '1';
          btn.style.pointerEvents = 'auto';
          btn.style.transform = 'translateY(0)';
        } else {
          btn.style.opacity = '0';
          btn.style.pointerEvents = 'none';
          btn.style.transform = 'translateY(8px)';
        }
      }
      btn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      btn.addEventListener('mouseenter', function () { btn.style.background = 'rgba(255,255,255,0.95)'; btn.style.color = '#000'; btn.style.borderColor = 'rgba(255,255,255,0.95)'; });
      btn.addEventListener('mouseleave', function () { btn.style.background = 'rgba(23,23,23,0.85)'; btn.style.color = '#fff'; btn.style.borderColor = 'rgba(255,255,255,0.18)'; });
      window.addEventListener('scroll', update, { passive: true });
      update();
    })();
  </script>

</body>
</html>
