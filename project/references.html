  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body { font-family: 'Readex Pro', system-ui, -apple-system, sans-serif; background: #000; color: #fff; -webkit-font-smoothing: antialiased; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace; }

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="report-shell.jsx"></script>
  <script type="text/babel" src="report-primitives.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // APA 7th edition — strict, single alphabetical list. Italics via <i>.
    const refs = [
      'Australian Institute of Aboriginal and Torres Strait Islander Studies. (2020). <i>AIATSIS code of ethics for Aboriginal and Torres Strait Islander research</i>. <a href="https://aiatsis.gov.au/research/ethical-research/code-ethics" target="_blank" rel="noopener">https://aiatsis.gov.au/research/ethical-research/code-ethics</a>',
      'Australian Renewable Energy Agency. (2023). <i>Off-grid and fringe-of-grid case studies: Knowledge sharing report</i>. <a href="https://arena.gov.au/" target="_blank" rel="noopener">https://arena.gov.au/</a>',
      'Australian Renewable Energy Agency. (2024). <i>Regional Australia microgrids pilot program: Program guidelines</i>. <a href="https://arena.gov.au/" target="_blank" rel="noopener">https://arena.gov.au/</a>',
      'Bureau of Meteorology. (2024a). <i>Climate statistics for Australian locations: Coen airport</i>. Australian Government. <a href="http://www.bom.gov.au/climate/averages/" target="_blank" rel="noopener">http://www.bom.gov.au/climate/averages/</a>',
      'Bureau of Meteorology. (2024b). <i>Solar exposure and radiation gridded data: Cape York Peninsula</i>. Australian Government. <a href="http://www.bom.gov.au/climate/data-services/solar-information.shtml" target="_blank" rel="noopener">http://www.bom.gov.au/climate/data-services/solar-information.shtml</a>',
      'Bushlight. (2008). <i>Port Stewart</i> (Case Study No. 23). Centre for Appropriate Technology. <a href="https://static1.squarespace.com/static/5450868fe4b09b217330bb42/t/55a4ae70e4b07587ecc461e3/1436855920428/Bushlight+Case+study+23+-+Port+Stewart.pdf" target="_blank" rel="noopener">https://static1.squarespace.com/static/5450868fe4b09b217330bb42/t/55a4ae70e4b07587ecc461e3/1436855920428/Bushlight+Case+study+23+-+Port+Stewart.pdf</a>',
      'Cape York Land Council. (n.d.). <i>Cape York region: Indigenous Land Use Agreements (ILUAs)</i>. Retrieved 2026, from <a href="https://cyland.org.au/" target="_blank" rel="noopener">https://cyland.org.au/</a>',
      'Catch Power. (2024). <i>Green Catch: Solar PV surplus diverter installation and operation manual</i> (Rev. 4.2).',
      'Clean Energy Council. (2022). <i>Grid-connected solar PV system design guidelines for accredited installers</i>. <a href="https://www.cleanenergycouncil.org.au/" target="_blank" rel="noopener">https://www.cleanenergycouncil.org.au/</a>',
      'Department of Climate Change, Energy, the Environment and Water. (2024). <i>First Nations clean energy strategy</i>. Australian Government. <a href="https://www.dcceew.gov.au/" target="_blank" rel="noopener">https://www.dcceew.gov.au/</a>',
      'Engineers Without Borders Australia. (2026). <i>EWB Challenge 2026: Lama Lama Country design brief</i>.',
      'Fronius. (2024). <i>Symo Hybrid: Technical data and surplus management documentation</i>.',
      'Geoscience Australia. (2024). <i>Tropical cyclones: Cape York region historical record</i>. <a href="https://www.ga.gov.au/" target="_blank" rel="noopener">https://www.ga.gov.au/</a>',
      'Held, M., &amp; Ilg, R. (2011). Update of environmental indicators and energy payback time of CdTe PV systems in Europe. <i>Progress in Photovoltaics</i>, <i>19</i>(5), 614–626.',
      'Indigenous Business Australia. (2024). <i>Business solutions for Indigenous communities: Funding programs</i>. <a href="https://iba.gov.au/" target="_blank" rel="noopener">https://iba.gov.au/</a>',
      'International Energy Agency Photovoltaic Power Systems Programme. (2020). <i>Life cycle inventories and life cycle assessments of photovoltaic systems</i> (Report No. IEA-PVPS T12-19:2020). <a href="https://iea-pvps.org/" target="_blank" rel="noopener">https://iea-pvps.org/</a>',
      'Queensland Government. (2013). <i>Electrical Safety Regulation 2013</i> (Qld). Queensland Parliamentary Counsel.',
      'Roberts, M., Bruce, A., &amp; MacGill, I. (2019). Impact of shared battery energy storage systems on photovoltaic self-consumption and electricity bills in apartment buildings. <i>Applied Energy</i>, <i>245</i>, 78–95. <a href="https://doi.org/10.1016/j.apenergy.2019.04.001" target="_blank" rel="noopener">https://doi.org/10.1016/j.apenergy.2019.04.001</a>',
      'Selectronic. (2023). <i>SP PRO Series II: User and installation manual</i> (Rev. 7.0).',
      'Standards Australia. (2010). <i>Stand-alone power systems: System design</i> (AS/NZS 4509.2:2010).',
      'Standards Australia. (2018). <i>Electrical installations (known as the Australian/New Zealand Wiring Rules)</i> (AS/NZS 3000:2018).',
      'Standards Australia. (2021). <i>Installation and safety requirements for photovoltaic (PV) arrays</i> (AS/NZS 5033:2021).',
      'Widén, J., Wäckelgård, E., Paatero, J., &amp; Lund, P. (2016). Self-consumption enhancement and peak shaving of residential photovoltaics using storage and curtailment. <i>Energy</i>, <i>112</i>, 221–231.',
      'Williams, G., &amp; Gomes, P. (2022). Photovoltaic surplus management strategies for remote standalone power systems: A review. <i>Renewable and Sustainable Energy Reviews</i>, <i>154</i>, 111861.',
      'Yintjingga Aboriginal Corporation. (n.d.). <i>About Yintjingga</i>. Retrieved 2026, from <a href="https://www.yintjingga.com.au/" target="_blank" rel="noopener">https://www.yintjingga.com.au/</a>',
    ];

    function Page() {
      return (
        <div>
          <ReportNav active="report" />
          <PageHero chapter="12 — references" title={<>references</>} sub={`${refs.length} cited sources, alphabetical by author. Citation style: APA 7th edition.`} />

          <Section bg="#000" pad="60px 40px 120px">
            <div style={{ display: "flex", flexDirection: "column", gap: "20px", borderTop: "1px solid rgba(255,255,255,0.08)", paddingTop: "32px" }}>
              {refs.map((html, i) => (
                <p key={i} className="apa-entry" style={{ fontSize: "15px", color: "rgba(255,255,255,0.78)", margin: 0, lineHeight: 1.7, maxWidth: "920px" }}
                  dangerouslySetInnerHTML={{ __html: html }} />
              ))}
            </div>
          </Section>

          <ReportFooter prev={{ href: "recommendations.html", label: "Further Recommendations" }} next={{ href: "contents.html", label: "Back to Contents" }} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
  </script>
  <button id="back-to-top" type="button" aria-label="Back to top"
    style="position:fixed;right:24px;bottom:24px;z-index:200;width:44px;height:44px;border-radius:999px;border:1px solid rgba(255,255,255,0.18);background:rgba(23,23,23,0.85);backdrop-filter:blur(12px);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity 0.25s ease, transform 0.25s ease;font-family:inherit;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
  </button>
  <script>
    (function () { var btn = document.getElementById('back-to-top'); if (!btn) return;
      function update() { var y = window.scrollY || 0; if (y > 400) { btn.style.opacity='1'; btn.style.pointerEvents='auto'; btn.style.transform='translateY(0)'; } else { btn.style.opacity='0'; btn.style.pointerEvents='none'; btn.style.transform='translateY(8px)'; } }
      btn.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });
      window.addEventListener('scroll', update, { passive: true }); update();
    })();
  </script>
</body>
</html>
