<!DOCTYPE html>
<html lang="en" style="height:100%;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Overflow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ["'Readex Pro'", "system-ui", "-apple-system", "sans-serif"] } } }
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    #root { min-height: 100%; }
    body {
      font-family: 'Readex Pro', system-ui, -apple-system, sans-serif;
      background: #000; color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .hero-title { letter-spacing: -0.04em; line-height: 0.95; }
    ::placeholder { color: rgba(255,255,255,0.25); }

    img {
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    video {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    @keyframes switchFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
    @keyframes switchShadow { 0%,100%{transform:translateX(-50%) scale(1);opacity:.45} 50%{transform:translateX(-50%) scale(.7);opacity:.2} }
    @keyframes scrollDot { 0%{transform:translateY(0);opacity:0} 30%{opacity:1} 80%{opacity:1} 100%{transform:translateY(10px);opacity:0} }
    @keyframes scrollBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }

    @media (max-width: 768px) {
      body { font-size: 16px; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">



    const { useState, useEffect, useRef } = React;

    function LogoSVG() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="49.47 49.42 277.54 276.4" style={{ height: "20px", width: "20px", display: "block" }} fill="#ffffff" aria-hidden="true">
          <path fillRule="evenodd" d="M182.100 49.516 C 145.533 51.664,114.833 65.171,89.884 90.089 C 35.961 143.943,36.010 231.471,89.992 285.405 C 152.531 347.888,257.073 336.334,304.405 261.707 C 314.924 245.122,323.277 222.051,324.710 205.628 L 324.852 203.997 312.076 204.049 L 299.300 204.100 298.784 207.000 C 284.676 286.234,195.323 325.781,127.300 282.899 C 72.968 248.649,58.388 175.002,95.563 122.600 C 137.823 63.031,224.798 58.613,272.728 113.600 C 276.242 117.632,282.600 126.184,282.600 126.879 C 282.600 126.927,277.695 128.602,271.700 130.600 C 265.705 132.598,260.807 134.293,260.815 134.367 C 260.854 134.707,312.501 180.598,312.579 180.362 C 312.873 179.483,327.117 112.291,327.018 112.250 C 326.952 112.222,322.579 113.639,317.301 115.400 C 306.111 119.131,307.545 118.822,306.869 117.650 C 285.983 81.415,247.067 55.744,205.200 50.585 C 198.018 49.700,187.360 49.207,182.100 49.516 M174.870 108.999 C 174.634 109.094,174.385 109.263,174.316 109.374 C 174.247 109.485,171.183 123.239,167.507 139.938 C 160.359 172.412,159.927 174.321,157.791 182.860 C 157.026 185.917,156.400 188.719,156.400 189.087 L 156.400 189.754 162.150 189.880 C 177.701 190.219,179.044 190.278,179.269 190.636 C 179.617 191.190,173.483 223.249,167.299 253.200 C 164.968 264.489,164.689 266.524,165.589 265.710 C 167.829 263.682,218.098 172.360,218.740 169.152 L 218.850 168.600 208.612 168.600 C 197.734 168.600,197.600 168.588,197.600 167.643 C 197.600 167.344,202.387 154.106,208.238 138.225 C 218.371 110.721,218.859 109.338,218.500 109.075 C 218.063 108.756,175.657 108.681,174.870 108.999 " />
        </svg>
      );
    }

    function Navbar() {
      const [opacity, setOpacity] = useState(1);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [missionOpen, setMissionOpen] = useState(false);
      const [strategyOpen, setStrategyOpen] = useState(false);
      const [feasibilityOpen, setFeasibilityOpen] = useState(false);
      const [reportOpen, setReportOpen] = useState(false);
      const [isMobile, setIsMobile] = useState(typeof window !== 'undefined' && window.innerWidth < 768);
      const lastY = useRef(0);
      const closeTimer = useRef(null);
      const strategyCloseTimer = useRef(null);
      const feasibilityCloseTimer = useRef(null);
      const reportCloseTimer = useRef(null);

      useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        const scroller = document.getElementById("root").firstChild;
        const onScroll = () => {
          const y = scroller.scrollTop;
          const goingDown = y > lastY.current;
          lastY.current = y;
          if (y < 10) setOpacity(1);
          else if (goingDown && !isMobile) setOpacity(0);
          else setOpacity(1);
        };
        scroller.addEventListener("scroll", onScroll, { passive: true });
        return () => scroller.removeEventListener("scroll", onScroll);
      }, [isMobile]);

      const openMission = () => { clearTimeout(closeTimer.current); setMissionOpen(true); };
      const schedulClose = () => { closeTimer.current = setTimeout(() => setMissionOpen(false), 120); };
      const openStrategy = () => { clearTimeout(strategyCloseTimer.current); setStrategyOpen(true); };
      const closeStrategy = () => { strategyCloseTimer.current = setTimeout(() => setStrategyOpen(false), 120); };
      const openFeasibility = () => { clearTimeout(feasibilityCloseTimer.current); setFeasibilityOpen(true); };
      const closeFeasibility = () => { feasibilityCloseTimer.current = setTimeout(() => setFeasibilityOpen(false), 120); };
      const openReport = () => { clearTimeout(reportCloseTimer.current); setReportOpen(true); };
      const closeReport = () => { reportCloseTimer.current = setTimeout(() => setReportOpen(false), 120); };

      const navItems = [
        { label: "strategy", href: "#strategy", strategyDropdown: true },
        { label: "mission", href: "#mission", dropdown: true },
        { label: "feasibility", href: "#feasibility", feasibilityDropdown: true },
        { label: "report", href: "contents.html", reportDropdown: true },
        { label: "team", href: "#team" },
      ];

      const chevron = (open) => (
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{ opacity: 0.5, transition: "transform 0.25s", transform: open ? "rotate(180deg)" : "rotate(0deg)" }}>
          <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );

      const dropdownShell = (open) => ({
        position: "absolute", top: "calc(100% + 10px)", left: "50%",
        background: "rgba(23,23,23,0.97)", backdropFilter: "blur(16px)",
        border: "1px solid rgba(255,255,255,0.1)", borderRadius: "16px",
        padding: "8px", minWidth: "220px",
        opacity: open ? 1 : 0,
        pointerEvents: open ? "auto" : "none",
        transform: open ? "translateX(-50%) translateY(0)" : "translateX(-50%) translateY(-6px)",
        transition: "opacity 0.2s ease, transform 0.2s ease",
      });

      const arrowTip = {
        position: "absolute", top: "-5px", left: "50%", transform: "translateX(-50%) rotate(45deg)",
        width: "10px", height: "10px", background: "rgba(23,23,23,0.97)",
        border: "1px solid rgba(255,255,255,0.1)", borderBottom: "none", borderRight: "none",
      };

      const dropItem = (href, icon, title, sub) => (
        <a href={href} style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px 14px", borderRadius: "10px", textDecoration: "none", transition: "background 0.15s", color: "#fff" }}
          onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.08)"}
          onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
          <div style={{ width: "32px", height: "32px", borderRadius: "8px", background: "rgba(255,255,255,0.07)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{icon}</div>
          <div>
            <p style={{ fontSize: "13px", fontWeight: 500, margin: 0, letterSpacing: "-0.02em" }}>{title}</p>
            <p style={{ fontSize: "11px", color: "rgba(255,255,255,0.4)", margin: "2px 0 0" }}>{sub}</p>
          </div>
        </a>
      );

      if (isMobile) {
        return (
          <nav style={{ position: "fixed", zIndex: 50, top: 0, left: 0, right: 0, padding: "clamp(12px, 4vw, 20px)", display: "flex", alignItems: "center", justifyContent: "space-between", gap: "12px", opacity, transition: "opacity 0.5s ease", pointerEvents: opacity < 0.5 ? "none" : "auto", background: "rgba(0,0,0,0.95)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
              <LogoSVG />
              <span style={{ color: "#fff", fontSize: "clamp(12px, 3.5vw, 14px)", fontWeight: 400, letterSpacing: "-0.02em" }}>E-Overflow</span>
            </div>
            <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} style={{ background: "none", border: "none", color: "#fff", cursor: "pointer", padding: "8px", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                {mobileMenuOpen ? (
                  <>
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                  </>
                ) : (
                  <>
                    <line x1="4" y1="6" x2="20" y2="6"/>
                    <line x1="4" y1="12" x2="20" y2="12"/>
                    <line x1="4" y1="18" x2="20" y2="18"/>
                  </>
                )}
              </svg>
            </button>

            {mobileMenuOpen && (
              <div style={{ position: "fixed", top: "60px", left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.95)", backdropFilter: "blur(8px)", borderTop: "1px solid rgba(255,255,255,0.1)", padding: "clamp(12px, 3vw, 16px)", overflowY: "auto", zIndex: 40 }}>
                {navItems.map(({ label, href, dropdown, strategyDropdown, feasibilityDropdown, reportDropdown }) => {
                  const handleMobileNavClick = () => setMobileMenuOpen(false);
                  if (strategyDropdown) return (
                    <div key={label} style={{ paddingBottom: "clamp(8px, 2vw, 12px)" }}>
                      <button onClick={() => setStrategyOpen(!strategyOpen)} style={{ background: "none", border: "none", color: "#fff", fontSize: "clamp(14px, 4vw, 16px)", padding: "clamp(8px, 2vw, 12px) 0", width: "100%", textAlign: "left", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        {label}
                        <svg width="12" height="12" viewBox="0 0 10 10" fill="none" style={{ transform: strategyOpen ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>
                          <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                      </button>
                      {strategyOpen && (
                        <div style={{ paddingLeft: "clamp(12px, 3vw, 16px)", borderLeft: "1px solid rgba(255,255,255,0.1)", marginLeft: "clamp(4px, 1.5vw, 8px)", paddingTop: "clamp(6px, 1.5vw, 8px)" }}>
                          <a href="solution-one.html" onClick={handleMobileNavClick} style={{ display: "block", color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)", paddingBottom: "clamp(8px, 2vw, 10px)" }}>Solution One — Timer</a>
                          <a href="solution-two.html" onClick={handleMobileNavClick} style={{ display: "block", color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)" }}>Solution Two — Diverter</a>
                        </div>
                      )}
                    </div>
                  );
                  if (dropdown) return (
                    <div key={label} style={{ paddingBottom: "clamp(8px, 2vw, 12px)" }}>
                      <button onClick={() => setMissionOpen(!missionOpen)} style={{ background: "none", border: "none", color: "#fff", fontSize: "clamp(14px, 4vw, 16px)", padding: "clamp(8px, 2vw, 12px) 0", width: "100%", textAlign: "left", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        {label}
                        <svg width="12" height="12" viewBox="0 0 10 10" fill="none" style={{ transform: missionOpen ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>
                          <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                      </button>
                      {missionOpen && (
                        <div style={{ paddingLeft: "clamp(12px, 3vw, 16px)", borderLeft: "1px solid rgba(255,255,255,0.1)", marginLeft: "clamp(4px, 1.5vw, 8px)", paddingTop: "clamp(6px, 1.5vw, 8px)" }}>
                          <a href="lama-lama.html" onClick={handleMobileNavClick} style={{ display: "block", color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)" }}>Lama Lama Community</a>
                        </div>
                      )}
                    </div>
                  );
                  if (feasibilityDropdown) return (
                    <div key={label} style={{ paddingBottom: "clamp(8px, 2vw, 12px)" }}>
                      <button onClick={() => setFeasibilityOpen(!feasibilityOpen)} style={{ background: "none", border: "none", color: "#fff", fontSize: "clamp(14px, 4vw, 16px)", padding: "clamp(8px, 2vw, 12px) 0", width: "100%", textAlign: "left", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        {label}
                        <svg width="12" height="12" viewBox="0 0 10 10" fill="none" style={{ transform: feasibilityOpen ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>
                          <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                      </button>
                      {feasibilityOpen && (
                        <div style={{ paddingLeft: "clamp(12px, 3vw, 16px)", borderLeft: "1px solid rgba(255,255,255,0.1)", marginLeft: "clamp(4px, 1.5vw, 8px)", paddingTop: "clamp(6px, 1.5vw, 8px)" }}>
                          <a href="lama-lama-feasibility.html" onClick={handleMobileNavClick} style={{ display: "block", color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)" }}>Lama Lama — Feasibility Study</a>
                        </div>
                      )}
                    </div>
                  );
                  if (reportDropdown) return (
                    <div key={label} style={{ paddingBottom: "clamp(8px, 2vw, 12px)" }}>
                      <button onClick={() => setReportOpen(!reportOpen)} style={{ background: "none", border: "none", color: "#fff", fontSize: "clamp(14px, 4vw, 16px)", padding: "clamp(8px, 2vw, 12px) 0", width: "100%", textAlign: "left", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        {label}
                        <svg width="12" height="12" viewBox="0 0 10 10" fill="none" style={{ transform: reportOpen ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>
                          <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                      </button>
                      {reportOpen && (
                        <div style={{ paddingLeft: "clamp(12px, 3vw, 16px)", borderLeft: "1px solid rgba(255,255,255,0.1)", marginLeft: "clamp(4px, 1.5vw, 8px)", paddingTop: "clamp(6px, 1.5vw, 8px)", display: "grid", gridTemplateColumns: "1fr", gap: "clamp(6px, 1.5vw, 8px)" }}>
                          <a href="contents.html" onClick={handleMobileNavClick} style={{ color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)" }}>Contents</a>
                          <a href="executive-summary.html" onClick={handleMobileNavClick} style={{ color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)" }}>Executive Summary</a>
                          <a href="problem.html" onClick={handleMobileNavClick} style={{ color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)" }}>Problem & Brief</a>
                          <a href="design-process.html" onClick={handleMobileNavClick} style={{ color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)" }}>Design Process</a>
                          <a href="considerations.html" onClick={handleMobileNavClick} style={{ color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)" }}>Considerations</a>
                          <a href="risks.html" onClick={handleMobileNavClick} style={{ color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)" }}>Risks & Concerns</a>
                          <a href="implementation.html" onClick={handleMobileNavClick} style={{ color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)" }}>Implementation Plan</a>
                          <a href="recommendations.html" onClick={handleMobileNavClick} style={{ color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)" }}>Recommendations</a>
                          <a href="references.html" onClick={handleMobileNavClick} style={{ color: "rgba(255,255,255,0.7)", textDecoration: "none", fontSize: "clamp(13px, 3.5vw, 14px)" }}>References</a>
                        </div>
                      )}
                    </div>
                  );
                  return (
                    <a key={label} href={href} onClick={handleMobileNavClick} style={{ display: "block", color: "#fff", fontSize: "clamp(14px, 4vw, 16px)", padding: "clamp(8px, 2vw, 12px) 0", textDecoration: "none" }}>
                      {label}
                    </a>
                  );
                })}
                <div style={{ borderTop: "1px solid rgba(255,255,255,0.1)", marginTop: "clamp(8px, 2vw, 12px)", paddingTop: "clamp(8px, 2vw, 12px)" }}>
                  <a href="contact.html" onClick={handleMobileNavClick} style={{ display: "block", background: "#fff", color: "#000", fontSize: "clamp(13px, 3.5vw, 14px)", fontWeight: 500, borderRadius: "999px", padding: "clamp(10px, 2.5vw, 12px) clamp(16px, 4vw, 20px)", textDecoration: "none", textAlign: "center" }}>
                    learn more
                  </a>
                </div>
              </div>
            )}
          </nav>
        );
      }

      return (
        <nav style={{ position: "fixed", zIndex: 50, top: 0, left: 0, right: 0, padding: "24px 40px 0", display: "flex", alignItems: "center", justifyContent: "space-between", gap: "16px", opacity, transition: "opacity 0.5s ease", pointerEvents: opacity < 0.5 ? "none" : "auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "8px", background: "rgba(23,23,23,0.9)", backdropFilter: "blur(12px)", borderRadius: "999px", padding: "12px 24px 12px 16px" }}>
            <LogoSVG />
            <span style={{ color: "#fff", fontSize: "14px", fontWeight: 400, letterSpacing: "-0.02em" }}>E-Overflow</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: "4px", background: "rgba(23,23,23,0.9)", backdropFilter: "blur(12px)", borderRadius: "999px", padding: "8px 12px" }}>
            {navItems.map(({ label, href, dropdown, strategyDropdown, feasibilityDropdown, reportDropdown }) => {
              if (strategyDropdown) return (
                <div key={label} style={{ position: "relative" }} onMouseEnter={openStrategy} onMouseLeave={closeStrategy}>
                  <a href={href} style={{ color: strategyOpen ? "#fff" : "rgba(212,212,212,1)", fontSize: "14px", padding: "8px 20px", borderRadius: "999px", textDecoration: "none", transition: "color 0.2s", display: "flex", alignItems: "center", gap: "5px" }}>
                    {label}{chevron(strategyOpen)}
                  </a>
                  <div style={dropdownShell(strategyOpen)}>
                    <div style={arrowTip}></div>
                    {dropItem("solution-one.html",
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.7 }}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
                      "Solution One — Timer", "Scheduled load shifting")}
                    {dropItem("solution-two.html",
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.7 }}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
                      "Solution Two — Diverter", "Real-time surplus sensing")}
                  </div>
                </div>
              );
              if (dropdown) return (
                <div key={label} style={{ position: "relative" }} onMouseEnter={openMission} onMouseLeave={schedulClose}>
                  <a href={href} style={{ color: missionOpen ? "#fff" : "rgba(212,212,212,1)", fontSize: "14px", padding: "8px 20px", borderRadius: "999px", textDecoration: "none", transition: "color 0.2s", display: "flex", alignItems: "center", gap: "5px" }}>
                    {label}{chevron(missionOpen)}
                  </a>
                  <div style={dropdownShell(missionOpen)}>
                    <div style={arrowTip}></div>
                    {dropItem("lama-lama.html",
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.7 }}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>,
                      "Lama Lama Community", "Cape York, Queensland")}
                  </div>
                </div>
              );
              if (feasibilityDropdown) return (
                <div key={label} style={{ position: "relative" }} onMouseEnter={openFeasibility} onMouseLeave={closeFeasibility}>

          btn.style.transform = 'translateY(0)';
        } else {
          btn.style.opacity = '0';
          btn.style.pointerEvents = 'none';
          btn.style.transform = 'translateY(8px)';
        }
      }
      btn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      btn.addEventListener('mouseenter', function () { btn.style.background = 'rgba(255,255,255,0.95)'; btn.style.color = '#000'; btn.style.borderColor = 'rgba(255,255,255,0.95)'; });
      btn.addEventListener('mouseleave', function () { btn.style.background = 'rgba(23,23,23,0.85)'; btn.style.color = '#fff'; btn.style.borderColor = 'rgba(255,255,255,0.18)'; });
      window.addEventListener('scroll', update, { passive: true });
      update();
    })();
  </script>
</body>
</html>
