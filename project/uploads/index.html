<!DOCTYPE html>
<html lang="en" style="height:100%;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Overflow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ["'Readex Pro'", "system-ui", "-apple-system", "sans-serif"] } } }
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    #root { min-height: 100%; }
    body {
      font-family: 'Readex Pro', system-ui, -apple-system, sans-serif;
      background: #000; color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .hero-title { letter-spacing: -0.04em; line-height: 0.95; }
    ::placeholder { color: rgba(255,255,255,0.25); }
    @keyframes switchFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
    @keyframes switchShadow { 0%,100%{transform:translateX(-50%) scale(1);opacity:.45} 50%{transform:translateX(-50%) scale(.7);opacity:.2} }
    @keyframes scrollDot { 0%{transform:translateY(0);opacity:0} 30%{opacity:1} 80%{opacity:1} 100%{transform:translateY(10px);opacity:0} }
    @keyframes scrollBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">


    const { useState, useEffect, useRef } = React;

    function LogoSVG() {
      return (
        <svg viewBox="0 0 256 256" style={{ height: "20px", width: "20px" }} fill="#ffffff">
          <path d="M 128 192 L 128 256 L 64.5 256 L 32 223 L 0 192 L 0 128 L 64 128 Z" />
          <path d="M 256 192 L 256 256 L 192.5 256 L 160 223 L 128 192 L 128 128 L 192 128 Z" />
          <path d="M 128 64 L 128 128 L 64.5 128 L 32 95 L 0 64 L 0 0 L 64 0 Z" />
          <path d="M 256 64 L 256 128 L 192.5 128 L 160 95 L 128 64 L 128 0 L 192 0 Z" />
        </svg>
      );
    }

    function Navbar() {
      const [opacity, setOpacity] = useState(1);
      const [missionOpen, setMissionOpen] = useState(false);
      const [strategyOpen, setStrategyOpen] = useState(false);
      const lastY = useRef(0);
      const closeTimer = useRef(null);
      const strategyCloseTimer = useRef(null);

      useEffect(() => {
        const scroller = document.getElementById("root").firstChild;
        const onScroll = () => {
          const y = scroller.scrollTop;
          const goingDown = y > lastY.current;
          lastY.current = y;
          if (y < 10) setOpacity(1);
          else if (goingDown) setOpacity(0);
          else setOpacity(1);
        };
        scroller.addEventListener("scroll", onScroll, { passive: true });
        return () => scroller.removeEventListener("scroll", onScroll);
      }, []);

      const openMission = () => { clearTimeout(closeTimer.current); setMissionOpen(true); };
      const schedulClose = () => { closeTimer.current = setTimeout(() => setMissionOpen(false), 120); };
      const openStrategy = () => { clearTimeout(strategyCloseTimer.current); setStrategyOpen(true); };
      const closeStrategy = () => { strategyCloseTimer.current = setTimeout(() => setStrategyOpen(false), 120); };

      const navItems = [
        { label: "strategy", href: "#strategy", strategyDropdown: true },
        { label: "mission", href: "#mission", dropdown: true },
        { label: "feasibility", href: "#feasibility" },
        { label: "team", href: "#team" },
      ];

      const chevron = (open) => (
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{ opacity: 0.5, transition: "transform 0.25s", transform: open ? "rotate(180deg)" : "rotate(0deg)" }}>
          <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      );

      const dropdownShell = (open) => ({
        position: "absolute", top: "calc(100% + 10px)", left: "50%",
        background: "rgba(23,23,23,0.97)", backdropFilter: "blur(16px)",
        border: "1px solid rgba(255,255,255,0.1)", borderRadius: "16px",
        padding: "8px", minWidth: "220px",
        opacity: open ? 1 : 0,
        pointerEvents: open ? "auto" : "none",
        transform: open ? "translateX(-50%) translateY(0)" : "translateX(-50%) translateY(-6px)",
        transition: "opacity 0.2s ease, transform 0.2s ease",
      });

      const arrowTip = {
        position: "absolute", top: "-5px", left: "50%", transform: "translateX(-50%) rotate(45deg)",
        width: "10px", height: "10px", background: "rgba(23,23,23,0.97)",
        border: "1px solid rgba(255,255,255,0.1)", borderBottom: "none", borderRight: "none",
      };

      const dropItem = (href, icon, title, sub) => (
        <a href={href} style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px 14px", borderRadius: "10px", textDecoration: "none", transition: "background 0.15s", color: "#fff" }}
          onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.08)"}
          onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
          <div style={{ width: "32px", height: "32px", borderRadius: "8px", background: "rgba(255,255,255,0.07)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{icon}</div>
          <div>
            <p style={{ fontSize: "13px", fontWeight: 500, margin: 0, letterSpacing: "-0.02em" }}>{title}</p>
            <p style={{ fontSize: "11px", color: "rgba(255,255,255,0.4)", margin: "2px 0 0" }}>{sub}</p>
          </div>
        </a>
      );

      return (
        <nav style={{ position: "fixed", zIndex: 50, top: 0, left: 0, right: 0, padding: "24px 40px 0", display: "flex", alignItems: "center", justifyContent: "space-between", gap: "16px", opacity, transition: "opacity 0.5s ease", pointerEvents: opacity < 0.5 ? "none" : "auto" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "8px", background: "rgba(23,23,23,0.9)", backdropFilter: "blur(12px)", borderRadius: "999px", padding: "12px 24px 12px 16px" }}>
            <LogoSVG />
            <span style={{ color: "#fff", fontSize: "14px", fontWeight: 400, letterSpacing: "-0.02em" }}>E-Overflow</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: "4px", background: "rgba(23,23,23,0.9)", backdropFilter: "blur(12px)", borderRadius: "999px", padding: "8px 12px" }}>
            {navItems.map(({ label, href, dropdown, strategyDropdown }) => {
              if (strategyDropdown) return (
                <div key={label} style={{ position: "relative" }} onMouseEnter={openStrategy} onMouseLeave={closeStrategy}>
                  <a href={href} style={{ color: strategyOpen ? "#fff" : "rgba(212,212,212,1)", fontSize: "14px", padding: "8px 20px", borderRadius: "999px", textDecoration: "none", transition: "color 0.2s", display: "flex", alignItems: "center", gap: "5px" }}>
                    {label}{chevron(strategyOpen)}
                  </a>
                  <div style={dropdownShell(strategyOpen)}>
                    <div style={arrowTip}></div>
                    {dropItem("solution-one.html",
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.7 }}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
                      "Solution One — Timer", "Scheduled load shifting")}
                    {dropItem("solution-two.html",
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.7 }}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
                      "Solution Two — Diverter", "Real-time surplus sensing")}
                  </div>
                </div>
              );
              if (dropdown) return (
                <div key={label} style={{ position: "relative" }} onMouseEnter={openMission} onMouseLeave={schedulClose}>
                  <a href={href} style={{ color: missionOpen ? "#fff" : "rgba(212,212,212,1)", fontSize: "14px", padding: "8px 20px", borderRadius: "999px", textDecoration: "none", transition: "color 0.2s", display: "flex", alignItems: "center", gap: "5px" }}>
                    {label}{chevron(missionOpen)}
                  </a>
                  <div style={dropdownShell(missionOpen)}>
                    <div style={arrowTip}></div>
                    {dropItem("lama-lama.html",
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.7 }}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>,
                      "Lama Lama Community", "Cape York, Queensland")}
                  </div>
                </div>
              );
              return (
                <a key={label} href={href} style={{ color: "rgba(212,212,212,1)", fontSize: "14px", padding: "8px 20px", borderRadius: "999px", textDecoration: "none", transition: "color 0.2s" }}
                  onMouseEnter={e => e.target.style.color = "#fff"}
                  onMouseLeave={e => e.target.style.color = "rgba(212,212,212,1)"}
                >{label}</a>
              );
            })}
          </div>
          <a href="contact.html" style={{ background: "#fff", color: "#000", fontSize: "14px", fontWeight: 400, borderRadius: "999px", padding: "12px 24px", textDecoration: "none", transition: "background 0.2s" }}
            onMouseEnter={e => e.currentTarget.style.background = "#e5e5e5"}
            onMouseLeave={e => e.currentTarget.style.background = "#fff"}
          >learn more</a>
        </nav>
      );
    }

    function StatBlock({ position, number, label, dividerRotate, dividerSide, alignRight, labelAbove }) {
      const isRightSide = dividerSide === "left";
      return (
        <div className={`absolute ${position}`}>
          {labelAbove && label && <p className={`text-xs md:text-sm mb-1 text-white/70 ${alignRight ? "text-right" : ""}`}>{label}</p>}
          <div className={`flex items-center gap-3 ${alignRight ? "justify-end" : ""}`}>
            {isRightSide && <div className="hidden md:block h-px w-24 bg-white/40" style={{ transform: `rotate(${dividerRotate}deg)` }}></div>}
            <span className="text-4xl md:text-5xl font-medium tracking-tight" style={{ fontSize: "40px" }}>{number}</span>
            {!isRightSide && <div className="hidden md:block h-px w-24 bg-white/40" style={{ transform: `rotate(${dividerRotate}deg)` }}></div>}
          </div>
          {!labelAbove && label && <p className={`text-xs md:text-sm mt-1 text-white/70 ${alignRight ? "text-right" : ""}`}>{label}</p>}
        </div>
      );
    }

    function Hero() {
      return (
        <section className="relative h-screen w-full overflow-hidden bg-black">
          <video className="absolute inset-0 w-full h-full object-cover" autoPlay loop muted playsInline src="uploads/8295518-hd_1920_1080_30fps.mp4"></video>
          <Navbar />
          <div className="relative h-full w-full">
            <h1 className="hero-title absolute text-white font-medium" style={{ fontSize: "clamp(60px, 14vw, 14vw)", left: "1rem", top: "18%", lineHeight: 0.95, letterSpacing: "-0.04em", textAlign: "left" }}>Don't</h1>
            <h1 className="hero-title absolute text-white font-medium" style={{ fontSize: "clamp(60px, 13vw, 13vw)", right: "1rem", top: "38%", lineHeight: 0.95, letterSpacing: "-0.04em" }}>Waste</h1>
            <h1 className="hero-title absolute text-white font-medium" style={{ fontSize: "clamp(60px, 13vw, 13vw)", left: "18%", top: "58%", lineHeight: 0.95, letterSpacing: "-0.04em" }}>Energy</h1>
            <p className="absolute text-white/90 leading-snug" style={{ left: "1.5rem", top: "46%", maxWidth: "240px", fontSize: "15px" }}>divert to essentials</p>
            <StatBlock position="right-6 md:right-24 top-[14%]" number="70% energy reduction" label="up to" labelAbove={true} dividerRotate={20} dividerSide="left" alignRight={true} />
            <div className="pointer-events-none absolute bottom-0 left-0 right-0 h-48 bg-gradient-to-b from-transparent to-black"></div>
            <StatBlock position="left-6 md:left-20 bottom-20 md:bottom-24" number="+reallocate" label="" dividerRotate={-20} dividerSide="right" alignRight={false} />
            <StatBlock position="right-6 md:right-20 bottom-16 md:bottom-20" number="+decarbonise" label="sample3" dividerRotate={-20} dividerSide="left" alignRight={true} />

            {/* Scroll indicator */}
            <div style={{ position: "absolute", bottom: "32px", left: "50%", transform: "translateX(-50%)", display: "flex", flexDirection: "column", alignItems: "center", gap: "10px", animation: "scrollBob 2.4s ease-in-out infinite", pointerEvents: "none" }}>
              <span style={{ fontSize: "10px", letterSpacing: "0.3em", color: "rgba(255,255,255,0.55)", textTransform: "uppercase" }}>scroll</span>
              <div style={{ width: "20px", height: "32px", border: "1.5px solid rgba(255,255,255,0.5)", borderRadius: "10px", position: "relative" }}>
                <div style={{ position: "absolute", left: "50%", top: "6px", width: "2px", height: "6px", borderRadius: "1px", background: "rgba(255,255,255,0.8)", transform: "translateX(-50%)", animation: "scrollDot 1.6s ease-in-out infinite" }}></div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function CommonProblem() {
      const flow = [
        { num: "01", label: "generation", body: "Panels produce surplus during peak sun hours.", tone: "good" },
        { num: "02", label: "battery first", body: "Most systems prioritise filling the battery — regardless of what's about to happen.", tone: "warn" },
        { num: "03", label: "big draw hits", body: "Hot water cycles, pumps, HVAC — high-load appliances pull immediately from those reserves.", tone: "bad" },
        { num: "04", label: "depleted", body: "Batteries are drained almost as fast as they filled. Net benefit: marginal.", tone: "bad" },
      ];
      const dot = (tone) => ({
        width: "10px", height: "10px", borderRadius: "50%", flexShrink: 0,
        background: tone === "good" ? "#9ae66e" : tone === "warn" ? "#e8c062" : "#e87b6e",
        boxShadow: tone === "good" ? "0 0 16px rgba(154,230,110,0.5)" : tone === "warn" ? "0 0 16px rgba(232,192,98,0.45)" : "0 0 16px rgba(232,123,110,0.45)",
      });

      return (
        <section id="common-problem" style={{ background: "#000", minHeight: "100vh", padding: "120px 40px 120px", display: "flex", flexDirection: "column", justifyContent: "center", position: "relative", overflow: "hidden" }}>
          {/* Ambient backdrop */}
          <div style={{ position: "absolute", top: "-20%", right: "-10%", width: "60%", height: "60%", background: "radial-gradient(circle, rgba(232,123,110,0.08) 0%, transparent 60%)", pointerEvents: "none" }}></div>

          <div style={{ position: "relative", maxWidth: "1280px", margin: "0 auto", width: "100%" }}>
            <p style={{ fontSize: "12px", letterSpacing: "0.18em", textTransform: "uppercase", color: "rgba(255,255,255,0.35)", marginBottom: "64px" }}>THE COMMON PROBLEM</p>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "100px", alignItems: "start", marginBottom: "100px" }}>
              <h2 style={{ fontSize: "clamp(40px, 5.5vw, 5.5vw)", fontWeight: 500, letterSpacing: "-0.04em", lineHeight: 0.95, color: "#fff", margin: 0 }}>
                solar is solved.<br />
                <span style={{ color: "rgba(255,255,255,0.4)" }}>allocation isn't.</span>
              </h2>
              <div style={{ paddingTop: "12px" }}>
                <p style={{ fontSize: "17px", color: "rgba(255,255,255,0.7)", lineHeight: 1.7, margin: "0 0 20px" }}>
                  Standard solar setups treat the battery as the default destination for any surplus energy. It sounds smart — store first, use later — until you look at when the loads actually arrive.
                </p>
                <p style={{ fontSize: "17px", color: "rgba(255,255,255,0.55)", lineHeight: 1.7, margin: 0 }}>
                  Hot water systems, pumps, and other major in-house appliances draw the moment they cycle on. The battery you just filled is depleted within minutes, and the surplus you could have used <em style={{ fontStyle: "normal", color: "#fff" }}>directly</em> is gone.
                </p>
              </div>
            </div>

            {/* Timeline of where it goes wrong */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "0", borderTop: "1px solid rgba(255,255,255,0.12)", borderBottom: "1px solid rgba(255,255,255,0.12)" }}>
              {flow.map((f, i) => (
                <div key={f.num} style={{ padding: "32px 28px 36px", borderRight: i < 3 ? "1px solid rgba(255,255,255,0.08)" : "none", position: "relative" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "24px" }}>
                    <div style={dot(f.tone)}></div>
                    <span style={{ fontSize: "11px", color: "rgba(255,255,255,0.35)", letterSpacing: "0.12em" }}>{f.num}</span>
                  </div>
                  <p style={{ fontSize: "20px", fontWeight: 500, color: "#fff", margin: "0 0 12px", letterSpacing: "-0.025em" }}>{f.label}</p>
                  <p style={{ fontSize: "14px", color: "rgba(255,255,255,0.5)", lineHeight: 1.6, margin: 0 }}>{f.body}</p>
                </div>
              ))}
            </div>

            {/* Result + bridge to solution */}
            <div style={{ marginTop: "80px", display: "grid", gridTemplateColumns: "1fr auto", gap: "48px", alignItems: "center" }}>
              <p style={{ fontSize: "clamp(22px, 2.6vw, 38px)", fontWeight: 400, letterSpacing: "-0.03em", lineHeight: 1.25, color: "rgba(255,255,255,0.85)", margin: 0, maxWidth: "760px" }}>
                The energy was generated. The energy was stored. The energy was wasted on the wrong load, in the wrong order. <span style={{ color: "#fff" }}>That's the gap our Solar Switch closes.</span>
              </p>
              <a href="StrategyStatement.html" style={{ display: "inline-flex", alignItems: "center", gap: "10px", background: "#fff", color: "#000", fontSize: "14px", borderRadius: "999px", padding: "14px 26px", textDecoration: "none", flexShrink: 0, transition: "background 0.2s" }}
                onMouseEnter={e => e.currentTarget.style.background = "#e5e5e5"}
                onMouseLeave={e => e.currentTarget.style.background = "#fff"}
              >see our solution →</a>
            </div>
          </div>
        </section>
      );
    }

    function SecondPage() {
      const pillars = [
        { num: "01", title: "audit", body: "Map every watt. We identify where energy is being consumed, wasted, and misallocated across your operations." },
        { num: "02", title: "implement", body: "Rebuild from first principles. Smarter load sequencing, storage integration, and renewable-first architecture." },
        { num: "03", title: "operate", body: "Ongoing monitoring and optimisation. Systems that learn, adapt, and keep performing as conditions change." },
      ];
      return (
        <section id="strategy" style={{ background: "#0a0a0a", minHeight: "100vh", padding: "120px 40px 100px", display: "flex", flexDirection: "column", justifyContent: "center" }}>
          <p style={{ fontSize: "12px", letterSpacing: "0.18em", textTransform: "uppercase", color: "rgba(255,255,255,0.35)", marginBottom: "64px" }}>THE STRATEGY</p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", alignItems: "center", margin: "0 0 100px" }}>
            <h2 style={{ fontSize: "clamp(40px, 6vw, 6vw)", fontWeight: 500, letterSpacing: "-0.04em", lineHeight: 0.95, color: "#fff", margin: 0 }}>
              time to switch<br />to net zero
            </h2>
            <div style={{ display: "flex", justifyContent: "center", alignItems: "center" }}>
              <div style={{ position: "relative", width: "500px", height: "500px", flexShrink: 0 }}>
                <div style={{ position: "absolute", bottom: "8%", left: "50%", width: "55%", height: "7%", background: "radial-gradient(ellipse at center, rgba(255,255,255,0.15) 0%, transparent 70%)", borderRadius: "50%", filter: "blur(4px)", transform: "translateX(-50%)", animation: "switchShadow 4.5s ease-in-out infinite" }}></div>
                <a href="solution-two.html"><img src="uploads/switch.png" alt="Tesla SHT-1" style={{ width: "100%", height: "100%", objectFit: "contain", animation: "switchFloat 4.5s ease-in-out infinite", filter: "drop-shadow(0 14px 28px rgba(0,0,0,0.55)) drop-shadow(0 4px 8px rgba(0,0,0,0.3))", userSelect: "none", cursor: "pointer" }} /></a>
              </div>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "2px" }}>
            {pillars.map((p, i) => {
              const [hov, setHov] = useState(false);
              return (
                <div key={p.num}
                  onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
                  style={{ borderTop: `1px solid ${hov ? "rgba(255,255,255,0.5)" : "rgba(255,255,255,0.12)"}`, paddingTop: "32px", paddingRight: i < 2 ? "48px" : "0", paddingBottom: "40px", transition: "border-color 0.3s", cursor: "default" }}>
                  <span style={{ fontSize: "11px", color: hov ? "rgba(255,255,255,0.6)" : "rgba(255,255,255,0.3)", letterSpacing: "0.1em", transition: "color 0.3s" }}>{p.num}</span>
                  <h3 style={{ fontSize: "clamp(36px, 4vw, 72px)", fontWeight: 500, letterSpacing: "-0.04em", lineHeight: 0.95, color: "#fff", margin: "16px 0 24px", transform: hov ? "translateX(8px)" : "translateX(0)", transition: "transform 0.35s cubic-bezier(0.4,0,0.2,1)" }}>{p.title}</h3>
                  <p style={{ fontSize: "15px", color: hov ? "rgba(255,255,255,0.8)" : "rgba(255,255,255,0.55)", lineHeight: 1.6, maxWidth: "320px", transition: "color 0.3s" }}>{p.body}</p>
                </div>
              );
            })}
          </div>
          <div style={{ marginTop: "100px", display: "flex", alignItems: "center", justifyContent: "space-between", borderTop: "1px solid rgba(255,255,255,0.1)", paddingTop: "40px" }}>
            <p style={{ fontSize: "clamp(20px, 2.5vw, 36px)", fontWeight: 400, letterSpacing: "-0.03em", color: "rgba(255,255,255,0.7)", margin: 0 }}>ready to stop wasting energy?</p>
            <a href="contact.html" style={{ background: "#fff", color: "#000", fontSize: "14px", fontWeight: 400, borderRadius: "999px", padding: "16px 32px", textDecoration: "none", display: "inline-block", flexShrink: 0, transition: "background 0.2s" }}
              onMouseEnter={e => e.currentTarget.style.background = "#e5e5e5"}

    function AudioControl() {
      const [muted, setMuted] = useState(false);
      const audioRef = useRef(null);

      useEffect(() => {
        const audio = audioRef.current;
        audio.volume = 0.35;
        audio.play().catch(() => {
          const unlock = () => { audio.play(); document.removeEventListener('click', unlock); };
          document.addEventListener('click', unlock);
        });
      }, []);

      const toggle = () => {
        const audio = audioRef.current;
        audio.muted = !audio.muted;
        setMuted(audio.muted);
      };

      return (
        <>
          <audio ref={audioRef} src="uploads/YuraSoop - Beautiful Nature Ambient.mp3" loop preload="auto"></audio>
          <button onClick={toggle} style={{
            position: "fixed", bottom: "28px", right: "28px", zIndex: 100,
            background: "rgba(23,23,23,0.85)", backdropFilter: "blur(12px)",
            border: "1px solid rgba(255,255,255,0.12)", borderRadius: "999px",
            color: "#fff", cursor: "pointer", padding: "10px 18px",
            display: "flex", alignItems: "center", gap: "8px",
            fontSize: "12px", letterSpacing: "0.05em"
          }}>
            {muted ? (
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

              </svg>
            ) : (
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              </svg>
            )}
            {muted ? "unmute" : "mute"}
          </button>
        </>
      );
    }
