<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tesla SHT-1 — Floating Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: radial-gradient(ellipse at center, #f6f9fc 0%, #e3eaf2 70%, #d4dde8 100%);
    font-family: 'Inter', system-ui, sans-serif;
  }

  .stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1500px;
  }

  /* The floating switch */
  .switch-wrap {
    position: relative;
    width: 60vmin;
    height: 60vmin;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: hover 4.5s ease-in-out infinite;
    transform-origin: center bottom;
  }

  .switch-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter:
      drop-shadow(0 8px 18px rgba(40, 60, 90, 0.18))
      drop-shadow(0 4px 6px rgba(40, 60, 90, 0.12));
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
  }

  /* Soft floor shadow that breathes with the float */
  .floor-shadow {
    position: absolute;
    bottom: 14%;
    left: 50%;
    transform: translateX(-50%);
    width: 38vmin;
    height: 4vmin;
    background: radial-gradient(ellipse at center, rgba(40, 60, 90, 0.28) 0%, rgba(40, 60, 90, 0) 70%);
    border-radius: 50%;
    animation: shadow-pulse 4.5s ease-in-out infinite;
    z-index: -1;
    filter: blur(2px);
  }

  /* Floating animation — pure vertical only, no tilt */
  @keyframes hover {
    0%, 100%   { transform: translateY(0); }
    50%        { transform: translateY(-22px); }
  }

  /* Shadow pulses inversely to the float to sell the height illusion */
  @keyframes shadow-pulse {
    0%, 100% {
      transform: translateX(-50%) scale(1);
      opacity: 0.55;
    }
    50% {
      transform: translateX(-50%) scale(0.78);
      opacity: 0.32;
    }
  }

  /* Optional caption overlay */
  .caption {
    position: absolute;
    bottom: 6%;
    left: 0; right: 0;
    text-align: center;
    color: #2a3a4a;
    pointer-events: none;
  }
  .caption .name { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .caption .sub { font-size: 13px; color: #6a7a8a; margin-top: 4px; font-weight: 500; }

  /* Subtle ambient glow behind switch */
  .glow {
    position: absolute;
    width: 70vmin;
    height: 70vmin;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(120, 180, 255, 0.18) 0%, rgba(120, 180, 255, 0) 60%);
    filter: blur(40px);
    z-index: -2;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="glow"></div>
  <div class="floor-shadow"></div>
  <div class="switch-wrap">
    <img src="switch.png" alt="Tesla SHT-1 Timer Switch" />
  </div>
</div>

<div class="caption">
  <div class="name">Tesla SHT-1 Digital Timer Switch</div>
  <div class="sub">Hot Water Diverter · Solar Soaking Controller · 12–240V AC/DC</div>
</div>
</body>
</html>
